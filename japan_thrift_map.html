<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japan Thrift Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --surface: #0a0a0a;
    --surface2: #111116;
    --border: #222230;
    --accent: #e8ff47;
    --accent2: #ff6b47;
    --accent3: #47c8ff;
    --text: #e8e8f0;
    --text-muted: #7070a0;
    --bookoff: #ff3355;
    --street2nd: #3388ff;
    --trefac: #ff9933;
    --treasure: #aa55ff;
    --hardoff: #22cc88;
    --recycle: #ff55aa;
    --other: #88aacc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Space Mono', monospace;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    z-index: 1000;
    flex-shrink: 0;
    position: relative;
  }

  .logo {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 900;
    font-size: 1.1rem;
    letter-spacing: 0.05em;
  }
  .logo span { color: var(--accent); }

  .stats {
    display: flex;
    gap: 20px;
    font-size: 0.7rem;
    color: var(--text-muted);
  }
  .stat-val { color: var(--accent); font-weight: 700; }

  /* ── THRIFT neon trigger ── */
  .logo-thrift {
    color: var(--accent);
    cursor: pointer;
    position: relative;
    display: inline-block;
    transition: color 0.2s;
    user-select: none;
  }
  /* underline bar */
  .logo-thrift::after {
    content: '';
    position: absolute;
    bottom: -3px;
    left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px;
    opacity: 0.5;
    transition: opacity 0.2s, box-shadow 0.2s;
  }
  .logo-thrift:hover::after,
  .logo-thrift.open::after {
    opacity: 1;
    box-shadow: 0 0 8px var(--accent), 0 0 16px var(--accent);
  }
  /* neon glow state when open */
  .logo-thrift.open {
    color: var(--accent);
    text-shadow:
      0 0 4px var(--accent),
      0 0 12px var(--accent),
      0 0 28px var(--accent),
      0 0 55px rgba(232,255,71,0.4);
    animation: neon-flicker 0.15s steps(1) 1;
  }
  @keyframes neon-flicker {
    0%   { text-shadow: none; }
    20%  { text-shadow: 0 0 4px var(--accent), 0 0 12px var(--accent); }
    40%  { text-shadow: none; }
    60%  { text-shadow: 0 0 4px var(--accent), 0 0 20px var(--accent); }
    80%  { text-shadow: none; }
    100% { text-shadow: 0 0 4px var(--accent), 0 0 12px var(--accent), 0 0 28px var(--accent), 0 0 55px rgba(232,255,71,0.4); }
  }

  /* ── FILTER DRAWER ── */
  .filter-drawer {
    position: fixed;
    top: 0;
    left: 0; right: 0;
    background: var(--surface);
    border-bottom: 2px solid var(--border);
    z-index: 1500;
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1), padding 0.2s, top 0s;
    padding: 0 20px;
  }
  .filter-drawer.open {
    max-height: 160px;
    padding: 12px 20px;
  }

  .filter-drawer-inner {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .filter-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-row-label {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    width: 52px;
    flex-shrink: 0;
  }

  .filter-btn {
    padding: 3px 10px;
    border-radius: 4px;
    border: 2px solid var(--chain-color, var(--border));
    background: transparent;
    color: var(--chain-color, var(--text-muted));
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    cursor: pointer;
    transition: all 0.1s;
    white-space: nowrap;
    letter-spacing: 0.03em;
    font-weight: 700;
  }
  .filter-btn:hover {
    background: color-mix(in srgb, var(--chain-color, #555) 15%, transparent);
  }
  .filter-btn.active {
    background: var(--chain-color, var(--text-muted));
    color: #000 !important;
    border-color: var(--chain-color, var(--text-muted));
  }

  /* ── INFO BAR ── */
  .info-bar {
    display: flex;
    gap: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    overflow: hidden;
  }

  .info-card {
    flex: 1;
    padding: 7px 16px;
    border-right: 1px solid var(--border);
    min-width: 0;
  }
  .info-card:last-child { border-right: none; }

  .info-card-label {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    margin-bottom: 2px;
  }

  .info-card-name {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
    transition: color 0.15s;
  }
  .info-card-name:hover { color: var(--accent); text-decoration: underline; }
  .info-card-name.overdue { color: var(--accent2); }
  .info-card-name.overdue:hover { color: #ff9977; }

  .info-card-sub {
    font-size: 0.58rem;
    color: var(--text-muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .info-card-empty {
    font-size: 0.65rem;
    color: var(--text-muted);
    font-style: italic;
  }

  #map {
    flex: 1;
    z-index: 1;
  }

  /* Popup panel */
  .store-panel {
    position: fixed;
    top: 0; right: 0;
    width: 340px;
    height: 100vh;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 2000;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .store-panel.open { transform: translateX(0); }

  .panel-header {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
  }

  .chain-tag {
    font-size: 0.65rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    color: #000;
    margin-bottom: 4px;
    display: inline-block;
  }

  .panel-name {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.3;
  }

  .gmaps-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    font-size: 0.62rem;
    color: var(--accent3);
    text-decoration: none;
    border: 1px solid rgba(71,200,255,0.3);
    border-radius: 4px;
    padding: 3px 8px;
    transition: all 0.15s;
    letter-spacing: 0.03em;
  }
  .gmaps-link:hover {
    background: rgba(71,200,255,0.1);
    border-color: var(--accent3);
  }

  .panel-addr {
    font-size: 0.65rem;
    color: var(--text-muted);
    margin-top: 3px;
  }

  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: color 0.1s;
  }
  .close-btn:hover { color: var(--text); }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* visited toggle */
  .visited-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 14px;
  }
  .visited-label { font-size: 0.75rem; }
  .toggle {
    position: relative;
    width: 42px; height: 22px;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute;
    inset: 0;
    background: var(--border);
    border-radius: 20px;
    cursor: pointer;
    transition: 0.2s;
  }
  .slider:before {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    left: 3px; bottom: 3px;
    background: var(--text-muted);
    border-radius: 50%;
    transition: 0.2s;
  }
  .toggle input:checked + .slider { background: var(--accent); }
  .toggle input:checked + .slider:before {
    transform: translateX(20px);
    background: #000;
  }

  /* rating */
  .section-title {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .stars {
    display: flex;
    gap: 4px;
  }
  .star {
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--border);
    transition: color 0.1s, transform 0.1s;
    user-select: none;
  }
  .star.filled { color: var(--accent); }
  .star:hover { transform: scale(1.2); }

  /* size picker */
  .size-grid {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .size-chip {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    cursor: pointer;
    transition: all 0.1s;
  }
  .size-chip.active {
    border-color: var(--accent3);
    color: var(--accent3);
    background: rgba(71,200,255,0.08);
  }

  /* items bought */
  .items-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .item-row {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border-radius: 6px;
    padding: 6px 10px;
  }
  .item-name {
    flex: 1;
    font-size: 0.75rem;
  }
  .item-price {
    font-size: 0.65rem;
    color: var(--accent);
  }
  .item-del {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.1s;
  }
  .item-del:hover { color: var(--accent2); }

  .add-item-row {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .add-item-row input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  .add-item-row input:focus { border-color: var(--accent3); }
  .add-item-row input::placeholder { color: var(--text-muted); }

  .btn-add {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.1s;
  }
  .btn-add:hover { opacity: 0.85; }

  /* notes */
  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text);
    resize: vertical;
    min-height: 70px;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent3); }
  textarea::placeholder { color: var(--text-muted); }

  /* last visit */
  .date-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    color-scheme: dark;
  }
  .date-input:focus { border-color: var(--accent3); }

  .save-row {
    padding: 12px 18px;
    border-top: 1px solid var(--border);
  }
  .btn-save {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.1s;
  }
  .btn-save:hover { opacity: 0.85; }
  .save-flash {
    text-align: center;
    font-size: 0.65rem;
    color: var(--accent);
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .save-flash.show { opacity: 1; }

  /* leaflet custom icons */
  .custom-marker {
    width: 28px; height: 28px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    display: flex; align-items: center; justify-content: center;
    border: 2px solid rgba(255,255,255,0.25);
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    transition: transform 0.1s;
  }
  .custom-marker .icon-inner {
    transform: rotate(45deg);
    font-size: 12px;
    line-height: 1;
    color: rgba(0,0,0,0.7);
    font-weight: 900;
  }
  .visited-ring {
    position: absolute;
    top: -4px; left: -4px;
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 0.8; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(1.15); }
  }

  /* leaflet dark tiles — game look */
  .leaflet-tile-pane {
    filter: brightness(0.72) saturate(0.4) hue-rotate(180deg) invert(0.88) contrast(1.05);
  }

  /* scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

  .leaflet-popup-content-wrapper {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  }
  .leaflet-popup-tip { background: var(--surface); }
  .leaflet-popup-content { margin: 10px 14px; }
  .popup-chain { font-size: 0.6rem; font-weight: 700; margin-bottom: 3px; }
  .popup-name { font-family: 'Zen Kaku Gothic New', sans-serif; font-weight: 700; font-size: 0.85rem; }
  .popup-meta { color: var(--text-muted); font-size: 0.6rem; margin-top: 4px; }
  .popup-stars { color: var(--accent); font-size: 0.75rem; margin-top: 3px; }
  .popup-open-btn {
    display: block;
    margin-top: 8px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 5px;
    padding: 5px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <div class="logo">JAPAN <span class="logo-thrift" id="filter-toggle-btn" onclick="toggleFilterDrawer()">THRIFT</span> MAP</div>

  <div class="stats">
    <span><span class="stat-val" id="stat-visited">0</span> visited</span>
    <span><span class="stat-val" id="stat-total">0</span> total</span>
    <span><span class="stat-val" id="stat-items">0</span> items found</span>
  </div>
</header>

<!-- Filter Drawer -->
<div class="filter-drawer" id="filter-drawer">
  <div class="filter-drawer-inner">
    <div class="filter-row">
      <span class="filter-row-label">CHAINS</span>
      <button class="filter-btn active" data-chain="all" data-color="#e8e8f0">ALL</button>
      <button class="filter-btn active" data-chain="BookOff" data-color="#ff3355">BookOff</button>
      <button class="filter-btn active" data-chain="2nd Street" data-color="#3388ff">2nd Street</button>
      <button class="filter-btn active" data-chain="TreFac" data-color="#ff9933">TreFac</button>
      <button class="filter-btn active" data-chain="Treasure Factory" data-color="#aa55ff">Treasure Factory</button>
      <button class="filter-btn active" data-chain="Hard Off" data-color="#22cc88">Hard Off</button>
      <button class="filter-btn active" data-chain="Recycle Shop" data-color="#ff55aa">Recycle</button>
    </div>
    <div class="filter-row">
      <span class="filter-row-label">STATUS</span>
      <button class="filter-btn" data-chain="visited" data-color="#e8ff47">✓ Visited</button>
      <button class="filter-btn" data-chain="unvisited" data-color="#ff6b47">○ Unvisited</button>
    </div>
  </div>
</div>

<!-- Info Bar -->
<div class="info-bar" id="info-bar">
  <div class="info-card">
    <div class="info-card-label">⏱ Last Visited</div>
    <div class="info-card-name" id="info-last-name">—</div>
    <div class="info-card-sub" id="info-last-date"></div>
  </div>
  <div class="info-card">
    <div class="info-card-label">🕐 Overdue (&gt;2 months)</div>
    <div id="info-overdue-list"></div>
  </div>
</div>

<div id="map"></div>

<!-- Side panel -->
<div class="store-panel" id="panel">
  <div class="panel-header">
    <div>
      <div class="chain-tag" id="p-chain-tag">BookOff</div>
      <div class="panel-name" id="p-name">Store Name</div>
      <div class="panel-addr" id="p-addr">Address</div>
      <a id="p-gmaps" href="#" target="_blank" class="gmaps-link">📍 Open in Google Maps</a>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body">

    <!-- Visited -->
    <div class="visited-row">
      <span class="visited-label">✓ Mark as Visited</span>
      <label class="toggle">
        <input type="checkbox" id="p-visited" onchange="onVisitedChange()">
        <span class="slider"></span>
      </label>
    </div>

    <!-- Last Visit Date -->
    <div>
      <div class="section-title">Last Visit</div>
      <input type="date" class="date-input" id="p-date">
    </div>

    <!-- Rating -->
    <div>
      <div class="section-title">Rating</div>
      <div class="stars" id="p-stars">
        <span class="star" data-val="1">★</span>
        <span class="star" data-val="2">★</span>
        <span class="star" data-val="3">★</span>
        <span class="star" data-val="4">★</span>
        <span class="star" data-val="5">★</span>
      </div>
    </div>

    <!-- Store Size -->
    <div>
      <div class="section-title">Store Size</div>
      <div class="size-grid" id="p-sizes">
        <button class="size-chip" data-size="XS">XS</button>
        <button class="size-chip" data-size="S">Small</button>
        <button class="size-chip" data-size="M">Medium</button>
        <button class="size-chip" data-size="L">Large</button>
        <button class="size-chip" data-size="XL">Huge</button>
      </div>
    </div>

    <!-- Items Bought -->
    <div>
      <div class="section-title">Items Found / Bought</div>
      <div class="items-list" id="p-items-list"></div>
      <div class="add-item-row">
        <input type="text" id="p-item-name" placeholder="Item name…" maxlength="60">
        <input type="text" id="p-item-price" placeholder="¥" style="width:70px; flex:none">
        <button class="btn-add" onclick="addItem()">+</button>
      </div>
    </div>

    <!-- Notes -->
    <div>
      <div class="section-title">Notes</div>
      <textarea id="p-notes" placeholder="Vibe, departments, hidden gems…"></textarea>
    </div>

  </div>
  <div class="save-row">
    <button class="btn-save" onclick="saveStore()">SAVE</button>
    <div class="save-flash" id="save-flash">Saved!</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ──────────────────────────────────────────────
// STORE DATA  (lat, lng, chain, name, address)
// ──────────────────────────────────────────────
const STORES = [
  // BOOKOFF / BOOKOFF SUPER BAZAAR
  {id:'bo1', chain:'BookOff', name:'Book Off Super Bazaar Chiba', lat:35.6075, lng:140.1065, addr:'Chiba City, Chiba'},
  {id:'bo2', chain:'BookOff', name:'Book Off Super Bazaar Funabashi', lat:35.6938, lng:139.9834, addr:'Funabashi, Chiba'},

  center: [35.68, 139.76],

}).addTo(map);

// ──────────────────────────────────────────────
// CUSTOM ICON
// ──────────────────────────────────────────────
function makeIcon(chain, visited) {
  const cfg = CHAIN_CFG[chain] || { color:'#88aacc', icon:'?' };
  const ring = visited ? `<div class="visited-ring"></div>` : '';
  const html = `
    <div style="position:relative; width:28px; height:28px;">
      ${ring}
      <div class="custom-marker" style="background:${cfg.color}; ${visited ? 'box-shadow: 0 0 0 2px var(--accent), 0 2px 8px rgba(0,0,0,0.5)' : ''}">
        <div class="icon-inner">${cfg.icon}</div>
      </div>
    </div>`;
  return L.divIcon({ html, className:'', iconSize:[28,28], iconAnchor:[14,28], popupAnchor:[0,-30] });
}

// ──────────────────────────────────────────────
// BUILD MARKERS
// ──────────────────────────────────────────────
STORES.forEach(store => {
  const ud = userData[store.id] || {};
  const visited = ud.visited || false;

  const marker = L.marker([store.lat, store.lng], { icon: makeIcon(store.chain, visited) });
  marker.storeId = store.id;

  const cfg = CHAIN_CFG[store.chain] || {};
  const stars = ud.rating ? '★'.repeat(ud.rating) + '☆'.repeat(5-ud.rating) : '☆☆☆☆☆';
  const itemCount = ud.items ? ud.items.length : 0;
  const visitedBadge = visited ? `<span style="color:var(--accent);font-weight:700">✓ VISITED</span>` : `<span style="color:var(--text-muted)">Not visited</span>`;

  marker.bindPopup(`
    <div>
      <div class="popup-chain" style="color:${cfg.color}">${cfg.label || store.chain}</div>
      <div class="popup-name">${store.name}</div>
      <div class="popup-meta">${store.addr}</div>
      <div class="popup-stars">${stars} ${itemCount > 0 ? `· ${itemCount} item${itemCount>1?'s':''} found` : ''}</div>
      <div class="popup-meta" style="margin-top:4px">${visitedBadge}</div>
      <button class="popup-open-btn" onclick="openPanel('${store.id}')">Open Details →</button>
    </div>
  `);

  marker.addTo(map);
  markers[store.id] = marker;
});

// PANEL
// ──────────────────────────────────────────────
function openPanel(storeId) {
  map.closePopup();
  currentStoreId = storeId;
  const store = STORES.find(s => s.id === storeId);
  const ud = userData[storeId] || {};
  const cfg = CHAIN_CFG[store.chain] || { color:'#888', label: store.chain };

  // header
  document.getElementById('p-chain-tag').textContent = cfg.label;
  document.getElementById('p-chain-tag').style.background = cfg.color;
  document.getElementById('p-name').textContent = store.name;
  document.getElementById('p-addr').textContent = store.addr;
  document.getElementById('p-gmaps').href = `https://www.google.com/maps/search/${encodeURIComponent(store.name + ' ' + store.addr + ' Japan')}`;

  // visited
  document.getElementById('p-visited').checked = !!ud.visited;

  // date
  document.getElementById('p-date').value = ud.lastVisit || '';

  // stars
  setStars(ud.rating || 0);
  document.querySelectorAll('.star').forEach(s => {
    s.onclick = () => setStars(parseInt(s.dataset.val));
  });

  // size
  document.querySelectorAll('.size-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.size === (ud.size || ''));
    c.onclick = () => {
      document.querySelectorAll('.size-chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
    };
  });

  // items
  renderItems(ud.items || []);

  // notes
  document.getElementById('p-notes').value = ud.notes || '';

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  currentStoreId = null;
}

function setStars(val) {
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.val) <= val);
  });
  // store temp rating on DOM
  document.getElementById('p-stars').dataset.val = val;
}

function renderItems(items) {
  const list = document.getElementById('p-items-list');
  list.innerHTML = '';
  items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <span class="item-name">${item.name}</span>
      ${item.price ? `<span class="item-price">¥${item.price}</span>` : ''}
      <button class="item-del" onclick="removeItem(${idx})">✕</button>`;
    list.appendChild(row);
  });
}

function addItem() {
  if (!currentStoreId) return;
  const nameEl = document.getElementById('p-item-name');
  const priceEl = document.getElementById('p-item-price');
  const name = nameEl.value.trim();
  if (!name) return;
  const price = priceEl.value.trim().replace(/[^0-9]/g,'');

  if (!userData[currentStoreId]) userData[currentStoreId] = {};
  if (!userData[currentStoreId].items) userData[currentStoreId].items = [];
  userData[currentStoreId].items.push({ name, price });
  renderItems(userData[currentStoreId].items);
  nameEl.value = '';
  priceEl.value = '';
}

function removeItem(idx) {
  if (!currentStoreId) return;
  userData[currentStoreId].items.splice(idx, 1);
  renderItems(userData[currentStoreId].items);
}

function onVisitedChange() {
  // live-update marker
  if (!currentStoreId) return;
  const visited = document.getElementById('p-visited').checked;
  if (!userData[currentStoreId]) userData[currentStoreId] = {};
  userData[currentStoreId].visited = visited;
  refreshMarker(currentStoreId);
  updateStats();
}

function saveStore() {
  if (!currentStoreId) return;
  if (!userData[currentStoreId]) userData[currentStoreId] = {};
  const ud = userData[currentStoreId];

  ud.visited = document.getElementById('p-visited').checked;
  ud.lastVisit = document.getElementById('p-date').value;
  ud.rating = parseInt(document.getElementById('p-stars').dataset.val || '0');
  ud.size = (document.querySelector('.size-chip.active') || {}).dataset?.size || '';
  ud.notes = document.getElementById('p-notes').value;
  // items already updated live

  localStorage.setItem('thrift_data', JSON.stringify(userData));
  refreshMarker(currentStoreId);
  updateStats();

  const flash = document.getElementById('save-flash');
  flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 1800);
}

function refreshMarker(storeId) {
  const store = STORES.find(s => s.id === storeId);
  const ud = userData[storeId] || {};
  const marker = markers[storeId];
  if (!marker) return;

  marker.setIcon(makeIcon(store.chain, !!ud.visited));

  const cfg = CHAIN_CFG[store.chain] || {};
  const stars = ud.rating ? '★'.repeat(ud.rating) + '☆'.repeat(5-ud.rating) : '☆☆☆☆☆';
  const itemCount = ud.items ? ud.items.length : 0;
  const visitedBadge = ud.visited ? `<span style="color:var(--accent);font-weight:700">✓ VISITED</span>` : `<span style="color:var(--text-muted)">Not visited</span>`;

  marker.setPopupContent(`
    <div>
      <div class="popup-chain" style="color:${cfg.color}">${cfg.label || store.chain}</div>
      <div class="popup-name">${store.name}</div>
      <div class="popup-meta">${store.addr}</div>
      <div class="popup-stars">${stars} ${itemCount > 0 ? `· ${itemCount} item${itemCount>1?'s':''} found` : ''}</div>
      <div class="popup-meta" style="margin-top:4px">${visitedBadge}</div>
      <button class="popup-open-btn" onclick="openPanel('${store.id}')">Open Details →</button>
    </div>
  `);
}

// ──────────────────────────────────────────────
// INFO BAR
// ──────────────────────────────────────────────
function updateInfoBar() {
  const TWO_MONTHS_MS = 60 * 24 * 60 * 60 * 1000; // ~60 days
  const now = Date.now();

  // Last visited store
  let lastStore = null, lastDate = 0;
  STORES.forEach(s => {
    const ud = userData[s.id] || {};
    if (ud.lastVisit) {
      const d = new Date(ud.lastVisit).getTime();
      if (d > lastDate) { lastDate = d; lastStore = s; }
    }
  });

  const nameEl = document.getElementById('info-last-name');
  const dateEl = document.getElementById('info-last-date');
  if (lastStore) {
    nameEl.textContent = lastStore.name;
    nameEl.onclick = () => panToStore(lastStore.id);
    dateEl.textContent = new Date(lastDate).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  } else {
    nameEl.textContent = 'None yet';
    nameEl.onclick = null;
    dateEl.textContent = 'Visit a store to track it';
  }

  // Overdue: visited but last visit > 2 months ago
  const overdue = STORES.filter(s => {
    const ud = userData[s.id] || {};
    if (!ud.visited || !ud.lastVisit) return false;
    return (now - new Date(ud.lastVisit).getTime()) > TWO_MONTHS_MS;
  }).sort((a, b) => {
    const da = new Date(userData[a.id].lastVisit).getTime();
    const db = new Date(userData[b.id].lastVisit).getTime();
    return da - db; // oldest first
  });

  const listEl = document.getElementById('info-overdue-list');
  listEl.innerHTML = '';
  if (overdue.length === 0) {
    listEl.innerHTML = '<div class="info-card-empty">All good — no overdue stores</div>';
  } else {
    overdue.slice(0, 3).forEach(s => {
      const ud = userData[s.id];
      const daysAgo = Math.floor((now - new Date(ud.lastVisit).getTime()) / (24*60*60*1000));
      const el = document.createElement('div');
      el.innerHTML = `<span class="info-card-name overdue" style="display:inline">${s.name}</span><span class="info-card-sub" style="display:inline; margin-left:6px">${daysAgo}d ago</span>`;
      el.querySelector('.info-card-name').onclick = () => panToStore(s.id);
      listEl.appendChild(el);
    });
    if (overdue.length > 3) {
      const more = document.createElement('div');
      more.className = 'info-card-sub';
      more.textContent = `+${overdue.length - 3} more`;
      listEl.appendChild(more);
    }
  }
}

function panToStore(storeId) {
  const store = STORES.find(s => s.id === storeId);
  if (!store) return;
  // close filter drawer if open
  document.getElementById('filter-drawer').classList.remove('open');
  document.getElementById('filter-toggle-btn').classList.remove('open');
  map.flyTo([store.lat, store.lng], 15, { duration: 1.2 });
  setTimeout(() => openPanel(storeId), 400);
}

// ──────────────────────────────────────────────
// FILTERS
// ──────────────────────────────────────────────
document.getElementById('filter-drawer').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  const chain = btn.dataset.chain;

  if (chain === 'all') {
    const allOn = activeFilters.size === Object.keys(CHAIN_CFG).length;
    if (allOn) {
      activeFilters.clear();
      document.querySelectorAll('.filter-btn[data-chain]').forEach(b => {
        if (!['visited','unvisited','all'].includes(b.dataset.chain)) b.classList.remove('active');
      });
    } else {
      Object.keys(CHAIN_CFG).forEach(c => activeFilters.add(c));
      document.querySelectorAll('.filter-btn[data-chain]').forEach(b => {
        if (!['visited','unvisited','all'].includes(b.dataset.chain)) b.classList.add('active');
      });
    }
    visitFilter = null;
    document.querySelector('[data-chain="visited"]').classList.remove('active');
    document.querySelector('[data-chain="unvisited"]').classList.remove('active');
  } else if (chain === 'visited') {
    visitFilter = visitFilter === 'visited' ? null : 'visited';
    btn.classList.toggle('active', visitFilter === 'visited');
    document.querySelector('[data-chain="unvisited"]').classList.remove('active');
  } else if (chain === 'unvisited') {
    visitFilter = visitFilter === 'unvisited' ? null : 'unvisited';
    btn.classList.toggle('active', visitFilter === 'unvisited');
    document.querySelector('[data-chain="visited"]').classList.remove('active');
  } else {
    if (activeFilters.has(chain)) {
      activeFilters.delete(chain);
      btn.classList.remove('active');
    } else {
      activeFilters.add(chain);
      btn.classList.add('active');
    }
  }

  applyFilters();
  updateFilterButtonState();
});

function applyFilters() {
  STORES.forEach(store => {
    const ud = userData[store.id] || {};
    const visited = !!ud.visited;
    const marker = markers[store.id];
    let show = activeFilters.has(store.chain);
    if (visitFilter === 'visited') show = show && visited;
    if (visitFilter === 'unvisited') show = show && !visited;
    if (show) {
      if (!map.hasLayer(marker)) marker.addTo(map);
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });
}

function updateStats() {
  const total = STORES.length;
  const visited = STORES.filter(s => (userData[s.id] || {}).visited).length;
  const items = STORES.reduce((acc, s) => acc + ((userData[s.id] || {}).items || []).length, 0);
  document.getElementById('stat-visited').textContent = visited;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-items').textContent = items;
  updateInfoBar();
}

  btn.style.setProperty('--chain-color', btn.dataset.color);
});

// ── Click sound (Web Audio API — no file needed) ──
function playClickSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = 'square';
    osc.frequency.setValueAtTime(1200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.06);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.08);
  } catch(e) {}
}

document.getElementById('filter-drawer').addEventListener('click', e => {
  if (e.target.closest('.filter-btn')) playClickSound();
}, true);
</script>
